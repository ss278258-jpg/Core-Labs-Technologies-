<style>
:root{
  --primary:#0a0f1c;
  --accent:#0ea5e9;
  --accent-bright:#38bdf8;
  --accent-glow:rgba(14,165,233,0.15);
  --text-primary:#f0f9ff;
  --text-secondary:#94a3b8;
  --text-muted:#64748b;
  --border:rgba(14,165,233,0.15);
  --surface:rgba(10,15,28,0.92);
  --track-color:rgba(14,165,233,0.25);
  --track-glow:rgba(14,165,233,0.5);
  --node-color:#0ea5e9;
  --success:#10b981;
  --warning:#f59e0b;
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--primary);color:var(--text-primary);line-height:1.6;overflow-x:hidden}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--primary)}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:0}

/* ===== ANIMATED PCB CIRCUIT BACKGROUND ===== */
.pcb-bg{position:absolute;top:0;left:0;width:100%;min-height:100vh;z-index:0;pointer-events:none;overflow:hidden;background:var(--primary);will-change:transform}
.pcb-grid{position:absolute;inset:0;background-image:linear-gradient(90deg,transparent 97%,rgba(14,165,233,0.08) 97%,rgba(14,165,233,0.08) 98%,transparent 98%),linear-gradient(0deg,transparent 97%,rgba(14,165,233,0.08) 97%,rgba(14,165,233,0.08) 98%,transparent 98%);background-size:80px 80px;opacity:0.4;animation:gridPulse 10s ease-in-out infinite}

/* === COPPER TRACES === */
.pcb-traces{position:absolute;inset:0}
.trace{position:absolute;background:linear-gradient(90deg,transparent 0%,rgba(14,165,233,0.6) 20%,rgba(56,189,248,0.9) 50%,rgba(14,165,233,0.6) 80%,transparent 100%);height:2px;opacity:0;border-radius:1px;animation:traceFlow 6s linear infinite;box-shadow:0 0 8px rgba(14,165,233,0.3),0 0 20px rgba(14,165,233,0.1);will-change:transform,opacity}
.trace:nth-child(1){top:8%;left:0;width:400px;animation-delay:0s}
.trace:nth-child(2){top:18%;left:5%;width:350px;animation-delay:0.8s;transform:rotate(3deg)}
.trace:nth-child(3){top:12%;right:0;width:380px;animation-delay:1.5s}
.trace:nth-child(4){top:32%;left:2%;width:280px;animation-delay:2.2s;transform:rotate(-2deg)}
.trace:nth-child(5){top:42%;right:3%;width:420px;animation-delay:0.3s}
.trace:nth-child(6){top:52%;left:8%;width:360px;animation-delay:1.1s;transform:rotate(5deg)}
.trace:nth-child(7){top:62%;right:8%;width:340px;animation-delay:1.9s}
.trace:nth-child(8){top:72%;left:0;width:450px;animation-delay:2.7s;transform:rotate(-4deg)}
.trace:nth-child(9){top:82%;right:0;width:400px;animation-delay:0.5s}
.trace:nth-child(10){top:28%;left:45%;width:300px;animation-delay:1.6s;transform:rotate(8deg)}
.trace:nth-child(11){top:58%;left:35%;width:380px;animation-delay:2.4s;transform:rotate(-6deg)}
.trace:nth-child(12){top:78%;left:20%;width:320px;animation-delay:0.9s}
.trace:nth-child(13){top:5%;left:60%;width:250px;animation-delay:3.1s}
.trace:nth-child(14){top:48%;left:55%;width:200px;animation-delay:1.3s;transform:rotate(15deg)}
.trace:nth-child(15){top:88%;left:70%;width:280px;animation-delay:2.0s}

.trace-v{position:absolute;background:linear-gradient(180deg,transparent 0%,rgba(14,165,233,0.6) 20%,rgba(56,189,248,0.9) 50%,rgba(14,165,233,0.6) 80%,transparent 100%);width:2px;opacity:0;border-radius:1px;animation:traceFlowV 7s linear infinite;box-shadow:0 0 8px rgba(14,165,233,0.3),0 0 20px rgba(14,165,233,0.1);will-change:transform,opacity}
.trace-v:nth-child(16){top:0;left:15%;height:280px;animation-delay:0.4s}
.trace-v:nth-child(17){top:8%;left:35%;height:320px;animation-delay:1.0s}
.trace-v:nth-child(18){top:0;left:55%;height:240px;animation-delay:1.7s}
.trace-v:nth-child(19){top:15%;left:75%;height:290px;animation-delay:2.5s}
.trace-v:nth-child(20){top:35%;left:25%;height:260px;animation-delay:0.2s}
.trace-v:nth-child(21){top:45%;left:65%;height:340px;animation-delay:1.4s}
.trace-v:nth-child(22){top:55%;left:45%;height:250px;animation-delay:2.1s}
.trace-v:nth-child(23){top:65%;left:10%;height:310px;animation-delay:0.7s}
.trace-v:nth-child(24){top:75%;left:85%;height:270px;animation-delay:1.8s}
.trace-v:nth-child(25){top:25%;left:50%;height:200px;animation-delay:2.9s}

/* === SIGNAL FLOW === */
.signal-flow{position:absolute;height:3px;border-radius:2px;opacity:0;animation:signalMove 4s linear infinite;will-change:transform,opacity}
.signal-flow::before{content:'';position:absolute;inset:0;border-radius:2px;box-shadow:0 0 10px currentColor,0 0 25px currentColor,0 0 40px currentColor}
.signal-flow:nth-child(26){top:8%;left:0;width:60px;background:linear-gradient(90deg,transparent,#38bdf8);color:#38bdf8;animation-delay:0s}
.signal-flow:nth-child(27){top:18%;left:5%;width:50px;background:linear-gradient(90deg,transparent,#0ea5e9);color:#0ea5e9;animation-delay:1.2s}
.signal-flow:nth-child(28){top:12%;right:0;width:55px;background:linear-gradient(90deg,transparent,#38bdf8);color:#38bdf8;animation-delay:2.0s;animation-direction:reverse}
.signal-flow:nth-child(29){top:32%;left:2%;width:45px;background:linear-gradient(90deg,transparent,#0ea5e9);color:#0ea5e9;animation-delay:0.6s}
.signal-flow:nth-child(30){top:42%;right:3%;width:65px;background:linear-gradient(90deg,transparent,#38bdf8);color:#38bdf8;animation-delay:1.8s}
.signal-flow:nth-child(31){top:52%;left:8%;width:55px;background:linear-gradient(90deg,transparent,#0ea5e9);color:#0ea5e9;animation-delay:2.8s}
.signal-flow:nth-child(32){top:62%;right:8%;width:50px;background:linear-gradient(90deg,transparent,#38bdf8);color:#38bdf8;animation-delay:0.3s;animation-direction:reverse}
.signal-flow:nth-child(33){top:72%;left:0;width:70px;background:linear-gradient(90deg,transparent,#0ea5e9);color:#0ea5e9;animation-delay:1.5s}
.signal-flow:nth-child(34){top:82%;right:0;width:60px;background:linear-gradient(90deg,transparent,#38bdf8);color:#38bdf8;animation-delay:2.5s}
.signal-flow:nth-child(35){top:28%;left:45%;width:50px;background:linear-gradient(90deg,transparent,#0ea5e9);color:#0ea5e9;animation-delay:0.9s}
.signal-flow:nth-child(36){top:58%;left:35%;width:55px;background:linear-gradient(90deg,transparent,#38bdf8);color:#38bdf8;animation-delay:2.2s;animation-direction:reverse}
.signal-flow:nth-child(37){top:0;left:15%;width:3px;height:50px;background:linear-gradient(180deg,transparent,#38bdf8);color:#38bdf8;animation-delay:0.5s;animation-name:signalMoveV}
.signal-flow:nth-child(38){top:8%;left:35%;width:3px;height:55px;background:linear-gradient(180deg,transparent,#0ea5e9);color:#0ea5e9;animation-delay:1.6s;animation-name:signalMoveV}
.signal-flow:nth-child(39){top:0;left:55%;width:3px;height:45px;background:linear-gradient(180deg,transparent,#38bdf8);color:#38bdf8;animation-delay:2.3s;animation-name:signalMoveV;animation-direction:reverse}
.signal-flow:nth-child(40){top:15%;left:75%;width:3px;height:60px;background:linear-gradient(180deg,transparent,#0ea5e9);color:#0ea5e9;animation-delay:0.1s;animation-name:signalMoveV}
.signal-flow:nth-child(41){top:35%;left:25%;width:3px;height:50px;background:linear-gradient(180deg,transparent,#38bdf8);color:#38bdf8;animation-delay:1.1s;animation-name:signalMoveV;animation-direction:reverse}
.signal-flow:nth-child(42){top:45%;left:65%;width:3px;height:65px;background:linear-gradient(180deg,transparent,#0ea5e9);color:#0ea5e9;animation-delay:2.6s;animation-name:signalMoveV}

@keyframes gridPulse{0%,100%{opacity:0.25}50%{opacity:0.45}}
@keyframes traceFlow{0%{opacity:0;transform:translateX(-120%)}10%{opacity:0.8}90%{opacity:0.8}100%{opacity:0;transform:translateX(120vw)}}
@keyframes traceFlowV{0%{opacity:0;transform:translateY(-120%)}10%{opacity:0.7}90%{opacity:0.7}100%{opacity:0;transform:translateY(120vh)}}
@keyframes signalMove{0%{opacity:0;transform:translateX(-100px)}20%{opacity:1}80%{opacity:1}100%{opacity:0;transform:translateX(calc(100vw + 100px))}}
@keyframes signalMoveV{0%{opacity:0;transform:translateY(-100px)}20%{opacity:1}80%{opacity:1}100%{opacity:0;transform:translateY(150vh)}}

/* NAVIGATION */
nav{position:fixed;top:0;width:100%;z-index:1000;background:rgba(10,15,28,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);transition:all 0.3s ease;animation:slideDown 0.6s ease}
nav.scrolled{background:rgba(10,15,28,0.97);box-shadow:0 4px 30px rgba(0,0,0,0.5)}
@keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
.nav-container{max-width:1280px;margin:0 auto;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;color:var(--text-primary);text-decoration:none;display:flex;align-items:center;gap:0.75rem;animation:fadeInLeft 0.8s ease}
.logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),var(--accent-bright));border-radius:0;display:flex;align-items:center;justify-content:center;font-size:1.3rem;box-shadow:0 0 20px var(--accent-glow);animation:iconPulse 3s ease-in-out infinite;overflow:hidden;padding:4px}
@keyframes iconPulse{0%,100%{box-shadow:0 0 15px var(--accent-glow)}50%{box-shadow:0 0 30px var(--accent-glow),0 0 50px var(--accent-glow)}}
@keyframes fadeInLeft{from{transform:translateX(-30px);opacity:0}to{transform:translateX(0);opacity:1}}
.nav-links{display:flex;gap:2.5rem;list-style:none;animation:fadeInRight 0.8s ease 0.2s both}
@keyframes fadeInRight{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
.nav-links a{color:var(--text-secondary);text-decoration:none;font-size:0.9rem;font-weight:500;transition:all 0.3s ease;position:relative;padding:0.5rem 0}
.nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent-bright));transition:width 0.3s ease}
.nav-links a:hover,.nav-links a:focus{color:var(--text-primary);outline:none}
.nav-links a:hover::after,.nav-links a:focus::after{width:100%}
.nav-links a[aria-current="page"]{color:var(--accent-bright)}
.nav-links a[aria-current="page"]::after{width:100%}
.mobile-menu-btn{display:none;background:none;border:none;color:var(--text-primary);font-size:1.5rem;cursor:pointer;padding:0.5rem}
.mobile-menu-btn:focus{outline:2px solid var(--accent);outline-offset:2px}

/* HERO - CENTERED */
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;padding:7rem 2rem 4rem}
.hero-content{text-align:center;max-width:900px;position:relative;z-index:1;margin:0 auto}
.hero-badge{display:inline-flex;align-items:center;gap:0.5rem;padding:0.6rem 1.5rem;background:rgba(14,165,233,0.1);border:1px solid rgba(14,165,233,0.25);border-radius:0;font-size:0.85rem;font-weight:500;color:var(--accent-bright);margin-bottom:2rem;animation:fadeInDown 0.8s ease,badgeGlow 3s ease-in-out infinite 1s;backdrop-filter:blur(10px)}
@keyframes badgeGlow{0%,100%{box-shadow:0 0 5px rgba(14,165,233,0.1)}50%{box-shadow:0 0 20px rgba(14,165,233,0.2)}}
.hero-badge .dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite;box-shadow:0 0 8px var(--accent-glow)}
.hero h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(2.5rem,6vw,4.5rem);font-weight:700;line-height:1.1;margin-bottom:1.5rem;animation:fadeInUp 0.8s ease 0.2s both}
.hero h1 .highlight{background:linear-gradient(135deg,var(--accent),var(--accent-bright),#7dd3fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradientShift 5s ease-in-out infinite;background-size:200% 200%}
@keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.hero-subtitle{font-size:clamp(1rem,2vw,1.25rem);color:var(--text-secondary);max-width:650px;margin:0 auto 2.5rem;animation:fadeInUp 0.8s ease 0.4s both;line-height:1.7}
.hero-cta{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;animation:fadeInUp 0.8s ease 0.6s both}
.btn{padding:0.9rem 2.25rem;border-radius:0;font-size:0.95rem;font-weight:600;text-decoration:none;transition:all 0.3s ease;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:0.5rem;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);transition:left 0.5s ease}
.btn:hover::before{left:100%}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-bright));color:var(--primary);box-shadow:0 4px 25px rgba(14,165,233,0.35);animation:btnGlow 3s ease-in-out infinite}
@keyframes btnGlow{0%,100%{box-shadow:0 4px 25px rgba(14,165,233,0.35)}50%{box-shadow:0 4px 35px rgba(14,165,233,0.5),0 0 20px rgba(14,165,233,0.2)}}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 40px rgba(14,165,233,0.6)}
.btn-secondary{background:transparent;color:var(--text-primary);border:1px solid rgba(14,165,233,0.3)}
.btn-secondary:hover{background:rgba(14,165,233,0.1);border-color:var(--accent);box-shadow:0 0 25px var(--accent-glow);transform:translateY(-2px)}
.btn:focus{outline:2px solid var(--accent-bright);outline-offset:2px}

/* STATS - CENTERED */
.stats-bar{display:flex;justify-content:center;gap:5rem;padding:3rem 2rem;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:rgba(10,15,28,0.9);backdrop-filter:blur(10px);flex-wrap:wrap;position:relative;z-index:1}
.stat-item{text-align:center}
.stat-number{font-family:'Space Grotesk',sans-serif;font-size:2.5rem;font-weight:700;color:var(--accent-bright);display:block;text-shadow:0 0 20px var(--accent-glow)}
.stat-label{font-size:0.875rem;color:var(--text-muted);margin-top:0.25rem;font-weight:500}

/* SECTIONS - CENTERED */
section{padding:6rem 2rem;max-width:1280px;margin:0 auto;position:relative;z-index:1;text-align:center;display:flex;flex-direction:column;align-items:center}
.section-header{text-align:center;margin-bottom:4rem;max-width:800px;margin-left:auto;margin-right:auto}
.section-tag{display:inline-block;padding:0.4rem 1.25rem;background:rgba(14,165,233,0.1);border:1px solid rgba(14,165,233,0.2);border-radius:0;font-size:0.8rem;font-weight:600;color:var(--accent-bright);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:1rem;animation:tagFlicker 4s ease-in-out infinite}
@keyframes tagFlicker{0%,100%{border-color:rgba(14,165,233,0.2)}50%{border-color:rgba(14,165,233,0.5);box-shadow:0 0 10px rgba(14,165,233,0.1)}}
.section-title{font-family:'Space Grotesk',sans-serif;font-size:clamp(2rem,4vw,3rem);font-weight:700;margin-bottom:1rem;text-align:center}
.section-desc{color:var(--text-secondary);max-width:650px;margin:0 auto;font-size:1.1rem;line-height:1.7;text-align:center}

/* BOX CARDS - EQUAL HEIGHT */
.box-card{background:var(--surface);border:1px solid var(--border);border-radius:0;padding:2.5rem;transition:all 0.4s ease;position:relative;overflow:hidden;backdrop-filter:blur(10px);text-align:center;height:100%;display:flex;flex-direction:column;align-items:center}
.box-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent-bright),transparent);opacity:0;transition:opacity 0.3s ease}
.box-card:hover{transform:translateY(-5px);border-color:rgba(14,165,233,0.3);box-shadow:0 20px 40px rgba(0,0,0,0.5),0 0 30px var(--accent-glow)}
.box-card:hover::before{opacity:1}

/* GRIDS - EQUAL HEIGHT */
.about-grid,.services-grid,.quality-grid,.features-grid,.contact-grid,.industries-grid,.projects-grid,.cert-grid{display:grid;justify-content:center;justify-items:stretch;align-items:stretch;place-items:stretch;width:100%}
.about-grid{grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:2rem;grid-auto-rows:1fr}
.services-grid{grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:2rem;grid-auto-rows:1fr}
.quality-grid{grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:2rem;grid-auto-rows:1fr}
.features-grid{grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem;grid-auto-rows:1fr}
.contact-grid{grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.5rem;grid-auto-rows:1fr}
.industries-grid{grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.5rem;grid-auto-rows:1fr}
.projects-grid{grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:2rem;grid-auto-rows:1fr;justify-content:center;max-width:1000px;margin:0 auto}
.cert-grid{grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.5rem;grid-auto-rows:1fr}

/* ABOUT - CENTERED */
.about-card h3{font-family:'Space Grotesk',sans-serif;font-size:1.25rem;margin-bottom:1rem;color:var(--text-primary);display:flex;align-items:center;justify-content:center;gap:0.75rem}
.about-card h3 i{color:var(--accent-bright);font-size:1.4rem;animation:iconSpin 10s linear infinite}
@keyframes iconSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.about-card p{color:var(--text-secondary);font-size:0.95rem;line-height:1.7;text-align:center;margin-top:auto}

/* SERVICES - CENTERED */
.service-card::after{content:'';position:absolute;top:-50%;right:-50%;width:200%;height:200%;background:radial-gradient(circle,var(--accent-glow) 0%,transparent 70%);opacity:0;transition:opacity 0.4s ease;pointer-events:none}
.service-card:hover::after{opacity:1}
.service-icon{width:64px;height:64px;background:linear-gradient(135deg,var(--accent),var(--accent-bright));border-radius:0;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 1.5rem;position:relative;z-index:1;box-shadow:0 4px 20px var(--accent-glow);color:var(--primary);animation:iconFloat 3s ease-in-out infinite;flex-shrink:0}
@keyframes iconFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.service-card h3{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;margin-bottom:1rem;position:relative;z-index:1;text-align:center}
.service-card p{color:var(--text-secondary);margin-bottom:0;position:relative;z-index:1;line-height:1.7;font-size:0.95rem;text-align:center;margin-top:auto}

/* INDUSTRIES */
.industry-card{padding:2rem}
.industry-icon{width:56p
